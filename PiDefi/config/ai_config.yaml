# SPDX-License-Identifier: MIT
# ai_config.yaml: Hyper-tech YAML config for PiDefi AI models.
# Defines hyperparameters, quantum training, holographic viz, and self-optimization.

network:
  testnet: "https://soroban-testnet.stellar.org"
  mainnet: "https://soroban-mainnet.stellar.org"
  current: "testnet"

models:
  liquidity_optimizer:
    framework: "tensorflow"
    type: "neural_network"
    layers:
      - type: "dense"
        units: 64
        activation: "relu"
        input_shape: [10]
      - type: "dropout"
        rate: 0.2
      - type: "dense"
        units: 32
        activation: "relu"
      - type: "dense"
        units: 1
        activation: "sigmoid"
    hyperparameters:
      epochs: 50
      batch_size: 32
      learning_rate: 0.001
      optimizer: "adam"
      loss: "mean_squared_error"
      metrics: ["mae"]
    quantum:
      enabled: true
      accelerator: "qiskit_simulator"  # Quantum simulator for training
      qubits: 4
    holographic:
      enabled: true
      layers:
        - name: "Liquidity Prediction"
          viz: "sphere"
          coords: [0.0, 0.0, 0.0]
          color: "blue"
      resolution: 1080
    self_optimization:
      enabled: true
      threshold: 0.85  # Retrain if accuracy below
      interval: 86400  # seconds

  risk_simulator:
    framework: "tensorflow"
    type: "recurrent"
    layers:
      - type: "lstm"
        units: 64
        input_shape: [10, 3]
      - type: "dropout"
        rate: 0.2
      - type: "dense"
        units: 32
        activation: "relu"
      - type: "dense"
        units: 1
        activation: "sigmoid"
    hyperparameters:
      epochs: 50
      batch_size: 32
      learning_rate: 0.001
      optimizer: "adam"
      loss: "binary_crossentropy"
      metrics: ["accuracy"]
    quantum:
      enabled: false
    holographic:
      enabled: true
      layers:
        - name: "Risk Projection"
          viz: "cube"
          coords: [1.0, 1.0, 1.0]
          color: "red"
      resolution: 1080
    self_optimization:
      enabled: true
      threshold: 0.90
      interval: 43200

  yield_predictor:
    framework: "tensorflow"
    type: "neural_network"
    layers:
      - type: "dense"
        units: 32
        activation: "relu"
        input_shape: [5]
      - type: "dense"
        units: 1
        activation: "linear"
    hyperparameters:
      epochs: 50
      batch_size: 32
      learning_rate: 0.001
      optimizer: "adam"
      loss: "mean_squared_error"
      metrics: ["mae"]
    quantum:
      enabled: true
      accelerator: "cirq_simulator"
      qubits: 2
    holographic:
      enabled: true
      layers:
        - name: "Yield Forecast"
          viz: "cylinder"
          coords: [0.5, 0.5, 0.5]
          color: "green"
      resolution: 1080
    self_optimization:
      enabled: true
      threshold: 0.80
      interval: 21600

data:
  pipelines:
    - name: "price_volume_pipeline"
      source: "chainlink_oracle"
      features: ["price", "volume", "volatility"]
      preprocessing:
        - type: "normalization"
        - type: "outlier_removal"
      quantum_enhanced: true  # Use quantum for data processing

deployment:
  on_chain: true  # Store models on Soroban
  encrypted: true
  key_file: "./quantum_keys/model_key.json"
  update_interval: 3600  # seconds

ci_cd:
  auto_train: false
  test_accuracy: 0.85
  rollback: true

logging:
  level: "info"
  file: "./logs/ai.log"
  max_size: "10MB"
